<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #EFF2F5;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            color: #1E2C3A;
            padding: 2rem 1rem;
        }

        .resume {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 45px -15px rgba(0, 0, 0, 0.15);
            display: grid;
            grid-template-columns: 280px 1fr;
            overflow: hidden;
        }

        /* SIDEBAR — тёмно-графитовый, строгий */
        .sidebar {
            background-color: #2C3E4E;
            color: #E6EDF2;
        }

        .profile-photo {
            line-height: 0;
        }
        .profile-photo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .sidebar-content {
            padding: 2rem 1.6rem 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section-title {
            text-transform: uppercase;
            font-weight: 600;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #A3B8CC;
            margin-bottom: 1.2rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #D3DEE8;
        }
        .contact-item i {
            width: 20px;
            color: #8CA3B9;
            font-size: 1rem;
        }
        .contact-item a {
            color: #D3DEE8;
            text-decoration: none;
            border-bottom: 1px dotted #5F7A96;
        }

        .lang-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 0.9rem;
            color: #D3DEE8;
        }
        .lang-level {
            text-align: right;
            color: #B2C5D9;
        }

        .skill-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .skill-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.75rem;
            border: 1px solid #4B6884;
            color: #E0EAF3;
            font-weight: 500;
        }

        .personal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .personal-tag {
            font-size: 0.85rem;
            color: #D3E2F0;
            border-bottom: 1px dotted #5F7A96;
            padding-bottom: 0.1rem;
        }

        /* MAIN — светлая часть, холодный нейтральный */
        .main {
            background: #FFFFFF;
            padding: 2.5rem 2.8rem;
        }

        .name-title h1 {
            font-size: 3.2rem;
            font-weight: 700;
            color: #1F2F3E;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-bottom: 0.4rem;
        }
        .subheadline {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            color: #526E82;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .subheadline i {
            margin-right: 5px;
            color: #5F7A96;
        }

        .desired-position {
            margin: 2rem 0 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #E4EBF0;
        }
        .position-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 1rem;
        }
        .position-title {
            font-weight: 700;
            font-size: 2rem;
            color: #2C3E4E;
        }
        .position-salary {
            font-weight: 600;
            font-size: 1.5rem;
            color: #2C3E4E;
        }
        .job-details {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-top: 0.5rem;
            color: #526E82;
            font-weight: 500;
        }
        .job-details i {
            width: 22px;
            color: #5F7A96;
        }

        .section-main-title {
            font-weight: 700;
            font-size: 1.25rem;
            color: #2C3E4E;
            margin: 2rem 0 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .section-main-title i {
            color: #5F7A96;
            font-size: 1.25rem;
            width: 28px;
        }

        .exp-item {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .exp-date {
            font-weight: 500;
            color: #5F7A96;
            font-size: 0.85rem;
            line-height: 1.4;
            padding-top: 0.1rem;
        }
        .exp-company {
            font-weight: 700;
            font-size: 1.1rem;
            color: #2C3E4E;
        }
        .exp-role {
            font-weight: 500;
            color: #526E82;
            margin: 0.2rem 0 0.6rem;
            font-size: 0.9rem;
        }
        .exp-desc {
            font-size: 0.9rem;
            color: #2E404F;
            list-style: none;
        }
        .exp-desc li {
            margin-bottom: 0.4rem;
            padding-left: 1.4rem;
            position: relative;
        }
        .exp-desc li::before {
            content: "—";
            position: absolute;
            left: 0;
            color: #8BA3BC;
        }

        .edu-item {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .edu-year {
            font-weight: 500;
            color: #5F7A96;
        }
        .institution {
            font-weight: 600;
            color: #2C3E4E;
        }

        .about-me {
            border: 1px solid #E4EBF0;
            background: #F9FBFD;
            padding: 1.5rem 2rem;
            border-radius: 24px;
            margin: 1.5rem 0 2rem;
            font-size: 0.9rem;
            color: #2C3E4E;
        }

        .footer-contacts {
            margin-top: 2rem;
            padding-top: 1.2rem;
            border-top: 1px solid #E4EBF0;
            color: #526E82;
            font-size: 0.9rem;
            display: flex;
            gap: 2.5rem;
            flex-wrap: wrap;
        }
        .footer-contacts a {
            color: #5F7A96;
            text-decoration: none;
            border-bottom: 1px dotted #C5D4E2;
        }

        @media (max-width: 800px) {
            .resume { grid-template-columns: 1fr; }
            .main { padding: 2rem; }
        }
        @media (max-width: 550px) {
            .exp-item { grid-template-columns: 1fr; gap: 0.3rem; }
            .name-title h1 { font-size: 2.5rem; }
            .position-title { font-size: 1.6rem; }
            .position-salary { font-size: 1.3rem; }
            .edu-item { grid-template-columns: 1fr; gap: 0.2rem; }
        }
    </style>
